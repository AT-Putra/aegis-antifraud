# Prometheus scrape config (T-18, ADR-007). Scrape API /metrics via jaringan docker.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: aegis-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
