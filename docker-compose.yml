# Aegis Anti Fraud — orkestrasi service inti (T-01, TRD §2/§3/§7, ADR-006).
# Batas memori PARAMETRIK: default = profil dev hemat (≈8 GB host);
# nilai produksi penuh TRD di-set via .env (lihat .env.example).
# Observability (Prometheus/Grafana) ditambahkan di T-18.

services:
  postgres:
    image: postgres:18
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # PostgreSQL 18+: mount di /var/lib/postgresql (bukan /data) — image menyimpan
      # data di subdir version-specific. Mount lama /data memicu error guard.
      - pgdata:/var/lib/postgresql
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: ${POSTGRES_MEM_LIMIT:-2g}
    cpus: ${POSTGRES_CPUS:-2}
    restart: unless-stopped
    networks: [aegis]

  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    env_file: .env
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      # jemalloc: kembalikan memori bebas ke OS cepat (cegah RSS merayap → OOM dev). T-18 ops.
      MALLOC_CONF: "background_thread:true,dirty_decay_ms:5000,muzzy_decay_ms:5000"
    volumes:
      - chdata:/var/lib/clickhouse
      # Mount FILE tunggal (bukan direktori) agar tidak menimpa docker_related_config.xml
      # bawaan image yang mengaktifkan listen 0.0.0.0 (koneksi antar-container).
      - ./infra/clickhouse/config.d/memory.xml:/etc/clickhouse-server/config.d/memory.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: ${CLICKHOUSE_MEM_LIMIT:-2g}
    cpus: ${CLICKHOUSE_CPUS:-2}
    restart: unless-stopped
    networks: [aegis]

  redis:
    image: redis:8.8
    command: ["redis-server", "--maxmemory", "${REDIS_MAXMEMORY:-384mb}", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: ${REDIS_MEM_LIMIT:-512m}
    cpus: ${REDIS_CPUS:-1}
    restart: unless-stopped
    networks: [aegis]

  api:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - models:/models          # artefak model (shared api ↔ job retrain T-17)
      - ./data/geoip:/data/geoip:ro   # GeoIP DB (ADR-009, TQ-07) — read-only; file di GEOIP_DIR
    mem_limit: ${API_MEM_LIMIT:-2g}
    cpus: ${API_CPUS:-2}
    # T-20 hardening: API = kode kita, tak butuh capability Linux apa pun (bind :8000
    # non-privileged). cap_drop ALL + no-new-privileges = defense-in-depth bila ada RCE.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    networks: [aegis]

  caddy:
    image: caddy:2.11
    env_file: .env
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/prelanding/dist:/srv/prelanding:ro   # bundel pre-landing (T-10; `make prelanding`)
      - ./frontend/dashboard/dist:/srv/dashboard:ro     # bundel dashboard (T-16; `make dashboard`)
      - caddydata:/data
      - caddyconfig:/config
    mem_limit: ${CADDY_MEM_LIMIT:-256m}
    cpus: ${CADDY_CPUS:-1}
    # T-20 hardening: Caddy bind :80/:443 (privileged) → pertahankan NET_BIND_SERVICE saja.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    networks: [aegis]

  # Observability (T-18, ADR-007). /metrics di-scrape internal (bukan lewat Caddy publik).
  prometheus:
    image: prom/prometheus:v3.12.0
    depends_on:
      - api
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    mem_limit: ${PROMETHEUS_MEM_LIMIT:-512m}
    cpus: ${PROMETHEUS_CPUS:-1}
    restart: unless-stopped
    networks: [aegis]

  grafana:
    image: grafana/grafana:12.3.7
    depends_on:
      - prometheus
    environment:
      # T-20: wajib di-set (tanpa default 'admin'). Compose menolak start bila kosong.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD di .env (acak kuat)}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      # T-20: bind loopback saja — tidak terekspos ke publik. Akses ops via SSH tunnel/VPN.
      - "127.0.0.1:3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    mem_limit: ${GRAFANA_MEM_LIMIT:-512m}
    cpus: ${GRAFANA_CPUS:-1}
    restart: unless-stopped
    networks: [aegis]

volumes:
  pgdata:
  chdata:
  redisdata:
  caddydata:
  models:
  caddyconfig:
  promdata:
  grafanadata:

networks:
  aegis:
    driver: bridge
